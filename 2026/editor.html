<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Welpen Game 2026: ?</title>
        <link rel="icon" href="data:," />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
                background: #1e1e1e;
                color: #ddd;
                font-family: system-ui, sans-serif;
                font-size: 13px;
            }

            /* Header / toolbar row */
            #header {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 4px 8px;
                background: #2a2a2a;
                border-bottom: 1px solid #444;
                flex-shrink: 0;
                min-height: 38px;
            }

            /* Tabs */
            .tab-btn {
                padding: 4px 14px;
                background: #333;
                border: 1px solid #555;
                border-radius: 4px 4px 0 0;
                color: #aaa;
                cursor: pointer;
                font-size: 13px;
                transition: background 0.15s;
                margin-right: 2px;
            }
            .tab-btn.active {
                background: #5a7a9a;
                border-color: #7aaded;
                color: #fff;
            }

            /* Separator */
            .sep {
                width: 1px;
                height: 22px;
                background: #555;
                margin: 0 6px;
            }
            .spacer {
                flex: 1;
            }

            /* Toolbar buttons */
            .tb-btn {
                padding: 4px 10px;
                background: #3a3a3a;
                border: 1px solid #555;
                border-radius: 3px;
                color: #ccc;
                cursor: pointer;
                font-size: 12px;
                white-space: nowrap;
                transition: background 0.12s;
            }
            .tb-btn:hover {
                background: #4a4a4a;
                color: #fff;
            }
            .tb-btn.active {
                background: #4a6a8a;
                border-color: #7aaded;
                color: #fff;
            }
            .tb-btn.danger {
                background: #5a2222;
                border-color: #aa4444;
                color: #ffaaaa;
            }
            .tb-btn.danger:hover {
                background: #6a3333;
            }
            .tb-btn.green {
                background: #2a5a2a;
                border-color: #4aaa4a;
                color: #aaffaa;
            }
            .tb-btn.green:hover {
                background: #3a6a3a;
            }

            /* Brush size control */
            #brush-controls {
                display: none;
                align-items: center;
                gap: 6px;
                color: #aaa;
                font-size: 12px;
            }
            #brush-controls.visible {
                display: flex;
            }
            #brush-size {
                width: 60px;
                accent-color: #7aaded;
            }

            /* Main 3-panel layout */
            #main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            /* Left panel */
            #left-panel {
                width: 210px;
                flex-shrink: 0;
                background: #242424;
                border-right: 1px solid #3a3a3a;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            #left-panel-header {
                padding: 6px 10px;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #666;
                border-bottom: 1px solid #333;
                flex-shrink: 0;
            }
            #left-panel-body {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0;
            }

            /* Right panel */
            #right-panel {
                width: 230px;
                flex-shrink: 0;
                background: #242424;
                border-left: 1px solid #3a3a3a;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            #right-panel-header {
                padding: 6px 10px;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #666;
                border-bottom: 1px solid #333;
                flex-shrink: 0;
            }
            #right-panel-body {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
            }

            /* Viewport */
            #viewport {
                flex: 1;
                position: relative;
                overflow: hidden;
            }
            #viewport canvas {
                display: block;
                width: 100% !important;
                height: 100% !important;
            }

            /* List items */
            .list-section {
                padding: 5px 10px 2px;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #555;
                margin-top: 4px;
            }
            .list-item {
                display: flex;
                align-items: center;
                padding: 5px 10px;
                cursor: pointer;
                border-radius: 0;
                gap: 6px;
                border-left: 2px solid transparent;
                transition: background 0.1s;
            }
            .list-item:hover {
                background: #2d2d2d;
            }
            .list-item.selected {
                background: #1e3a55;
                border-left-color: #5a9adf;
                color: #fff;
            }
            .list-item .list-label {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .list-item .list-icon {
                font-size: 14px;
                opacity: 0.6;
                width: 16px;
                text-align: center;
            }
            .list-add-btn {
                display: block;
                width: calc(100% - 20px);
                margin: 4px 10px;
                padding: 5px 8px;
                background: #2d2d2d;
                border: 1px dashed #444;
                border-radius: 3px;
                color: #777;
                cursor: pointer;
                font-size: 12px;
                text-align: left;
                font-family: inherit;
            }
            .list-add-btn:hover {
                background: #363636;
                color: #bbb;
            }

            /* Inspector fields */
            .section-title {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #555;
                padding: 10px 0 4px;
                border-bottom: 1px solid #333;
                margin-bottom: 6px;
            }
            .section-title:first-child {
                padding-top: 0;
            }

            .field {
                margin-bottom: 8px;
            }
            .field > label {
                display: block;
                font-size: 11px;
                color: #777;
                margin-bottom: 3px;
                text-transform: uppercase;
                letter-spacing: 0.04em;
            }
            .field input[type='text'],
            .field input[type='number'],
            .field select {
                width: 100%;
                background: #2e2e2e;
                border: 1px solid #484848;
                border-radius: 3px;
                color: #ddd;
                padding: 4px 7px;
                font-size: 12px;
                font-family: inherit;
                outline: none;
            }
            .field input[type='text']:focus,
            .field input[type='number']:focus,
            .field select:focus {
                border-color: #5a9adf;
            }
            .field select option {
                background: #2e2e2e;
            }

            .field .vec3,
            .field .vec2 {
                display: grid;
                gap: 4px;
            }
            .field .vec3 {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .field .vec2 {
                grid-template-columns: 1fr 1fr;
            }

            .field .vec-row {
                display: flex;
                flex-direction: column;
            }
            .field .vec-row span {
                font-size: 10px;
                color: #555;
                text-align: center;
                margin-bottom: 1px;
            }

            .field input[type='color'] {
                width: 100%;
                height: 28px;
                border: 1px solid #484848;
                border-radius: 3px;
                background: #2e2e2e;
                cursor: pointer;
                padding: 2px;
            }
            .field input[type='checkbox'] {
                margin-right: 6px;
                cursor: pointer;
                accent-color: #5a9adf;
            }

            .empty-msg {
                color: #444;
                text-align: center;
                padding: 24px 0;
                font-size: 12px;
            }

            .action-btn {
                width: 100%;
                padding: 6px;
                margin-top: 4px;
                border-radius: 3px;
                font-size: 12px;
                font-family: inherit;
                cursor: pointer;
            }
            .action-btn.danger {
                background: #4a1a1a;
                border: 1px solid #883333;
                color: #ffaaaa;
            }
            .action-btn.danger:hover {
                background: #5a2222;
            }
            .action-btn.primary {
                background: #1e4a1e;
                border: 1px solid #3a883a;
                color: #aaffaa;
                margin-top: 8px;
            }
            .action-btn.primary:hover {
                background: #2a5a2a;
            }

            /* Texture field */
            .texture-row {
                display: flex;
                gap: 4px;
            }
            .texture-row input {
                flex: 1;
                min-width: 0;
            }
            .tex-upload-btn {
                flex-shrink: 0;
                padding: 4px 7px;
                background: #333;
                border: 1px solid #555;
                border-radius: 3px;
                color: #aaa;
                cursor: pointer;
                font-size: 14px;
            }
            .tex-upload-btn:hover {
                background: #444;
                color: #fff;
            }

            /* Layer dialog */
            dialog {
                background: #2a2a2a;
                border: 1px solid #555;
                border-radius: 6px;
                color: #ddd;
                padding: 16px;
                width: 320px;
                font-family: system-ui, sans-serif;
                font-size: 13px;
            }
            dialog::backdrop {
                background: rgba(0, 0, 0, 0.6);
            }
            #layer-dialog-title {
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 12px;
                color: #ccc;
            }
            .dialog-actions {
                display: flex;
                gap: 8px;
                margin-top: 12px;
                justify-content: flex-end;
            }
            .dialog-btn {
                padding: 5px 14px;
                border-radius: 3px;
                font-size: 12px;
                font-family: inherit;
                cursor: pointer;
            }
            .dialog-btn.primary {
                background: #1e4a1e;
                border: 1px solid #3a883a;
                color: #aaffaa;
            }
            .dialog-btn.primary:hover { background: #2a5a2a; }
            .dialog-btn.secondary {
                background: #3a3a3a;
                border: 1px solid #555;
                color: #ccc;
            }
            .dialog-btn.secondary:hover { background: #4a4a4a; }
        </style>
    </head>
    <body>
        <dialog id="layer-dialog">
            <div id="layer-dialog-title">Add Layer</div>
            <div class="field">
                <label>Name</label>
                <input type="text" id="layer-dialog-name" placeholder="e.g. Grass" />
            </div>
            <div class="field">
                <label>Texture</label>
                <div class="texture-row">
                    <input type="text" id="layer-dialog-texture" placeholder="data/map/textures/..." />
                    <button id="layer-dialog-upload" class="tex-upload-btn" title="Upload PNG or JPG texture">&#128194;</button>
                </div>
            </div>
            <div class="field">
                <label>Texture Repeat</label>
                <input type="number" id="layer-dialog-repeat" min="0.25" max="32" step="0.5" value="1" />
            </div>
            <div class="dialog-actions">
                <button id="layer-dialog-cancel" class="dialog-btn secondary">Cancel</button>
                <button id="layer-dialog-save" class="dialog-btn primary">Save</button>
            </div>
        </dialog>
        <div id="header">
            <button id="tab-world" class="tab-btn active">World Editor</button>
            <button id="tab-defs" class="tab-btn">Object Defs</button>
            <div class="sep"></div>

            <!-- World editor toolbar -->
            <div id="toolbar-world" style="display: flex; align-items: center; gap: 4px">
                <button id="btn-select" class="tb-btn active" title="Select (V)">Select</button>
                <button id="btn-place" class="tb-btn" title="Place (P)">Place</button>
                <button id="btn-raise" class="tb-btn" title="Raise terrain (R)">Raise</button>
                <button id="btn-lower" class="tb-btn" title="Lower terrain (L)">Lower</button>
                <button id="btn-level" class="tb-btn" title="Level terrain (F)">Level</button>
                <button id="btn-paint" class="tb-btn" title="Paint terrain (N)">Paint</button>
                <button id="btn-scatter" class="tb-btn" title="Scatter objects">Scatter</button>
                <div id="brush-controls">
                    Brush: <input type="range" id="brush-size" min="1" max="64" value="4" />
                    <span id="brush-size-label">4</span>
                </div>
                <div class="sep"></div>
                <button id="btn-translate" class="tb-btn active" title="Translate (G)">&#8651; Pos</button>
                <button id="btn-rotate" class="tb-btn" title="Rotate (E)">&#8635; Rot</button>
                <button id="btn-scale" class="tb-btn" title="Scale (S)">&#8862; Scale</button>
            </div>

            <!-- Object defs toolbar -->
            <div id="toolbar-defs" style="display: none; align-items: center; gap: 4px">
                <button id="btn-add-def" class="tb-btn">+ Add Def</button>
                <button id="btn-del-def" class="tb-btn danger">&#8722; Del Def</button>
                <div class="sep"></div>
                <button id="btn-add-cube" class="tb-btn">+ Cube</button>
                <button id="btn-add-cylinder" class="tb-btn">+ Cylinder</button>
                <button id="btn-add-sphere" class="tb-btn">+ Sphere</button>
                <button id="btn-add-billboard" class="tb-btn">+ Billboard</button>
                <button id="btn-add-sprite" class="tb-btn">+ Sprite</button>
                <button id="btn-add-plane" class="tb-btn">+ Plane</button>
                <button id="btn-del-comp" class="tb-btn danger">&#8722; Del Comp</button>
                <div class="sep"></div>
                <button id="btn-defs-translate" class="tb-btn active" title="Move">&#8651; Pos</button>
                <button id="btn-defs-rotate" class="tb-btn" title="Rotate">&#8635; Rot</button>
                <button id="btn-defs-scale" class="tb-btn" title="Scale">&#8862; Scale</button>
            </div>

            <div class="spacer"></div>
            <button id="btn-save" class="tb-btn green">Save</button>
        </div>

        <div id="main">
            <div id="left-panel">
                <div id="left-panel-header">Entities</div>
                <div id="left-panel-body"></div>
            </div>

            <div id="viewport"></div>

            <div id="right-panel">
                <div id="right-panel-header">Properties</div>
                <div id="right-panel-body"></div>
            </div>
        </div>

        <script type="module" src="./src/editor/index.ts"></script>
    </body>
</html>
