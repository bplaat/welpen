<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Welpen Game 2026: ?</title>
        <link rel="icon" href="data:," />
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
                width: 100% !important;
                height: 100% !important;
            }

            #instructions {
                position: fixed;
                bottom: 16px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.55);
                color: #fff;
                padding: 8px 16px;
                border-radius: 6px;
                font-family: system-ui, sans-serif;
                font-size: 13px;
                text-align: center;
                transition: opacity 0.5s;
                pointer-events: none;
            }
            #instructions.hidden {
                opacity: 0;
            }
        </style>
    </head>
    <body>
        <div id="instructions">
            Click to capture mouse &bull; WASD move &bull; Mouse look &bull; Shift sprint &bull; Space jump &bull; Esc release
        </div>
        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
