<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
        <title>Welpen Game 2026: Wild West</title>
        <link rel="icon" href="data:," />
        <style>
            html,
            body {
                margin: 0;
                background: #000;
            }
            #loading {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000;
                z-index: 9999;
                transition: opacity 0.4s;
            }
            #loading > span {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(255, 255, 255, 0.15);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.75s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div id="loading"><span></span></div>
        <div id="stats"></div>
        <div id="instructions">
            Click to capture mouse &bull; WASD move &bull; Mouse look &bull; Shift sprint &bull; Space jump &bull; Esc
            release
        </div>
        <div id="region-name"></div>

        <div id="touch-controls">
            <div id="joystick-zone">
                <div id="joystick-base">
                    <div id="joystick-thumb"></div>
                </div>
            </div>
            <div id="look-zone"></div>
            <button id="btn-jump">Jump</button>
        </div>

        <div id="landscape-prompt">
            <span id="landscape-icon">&#8635;</span>
            <span>Rotate your device to landscape</span>
        </div>

        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
